<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebLite Pro | Video Downloader</title>
  
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    /* === CSS Reset & Variables === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #66fcf1;
      --primary-dark: #45a29e;
      --bg-dark: #0b0c10;
      --bg-card: #1f2833;
      --text-light: #c5c6c7;
      --text-white: #ffffff;
      --error: #ff6b6b;
      --success: #4ecdc4;
      --warning: #ffe66d;
      --glass: rgba(31, 40, 51, 0.8);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0b0c10 0%, #1f2833 50%, #0b0c10 100%);
      background-attachment: fixed;
      color: var(--text-light);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* === Animated Background === */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-animation::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(102, 252, 241, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      top: 10%;
      left: 10%;
      animation: float 20s infinite ease-in-out;
    }

    .bg-animation::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(69, 162, 158, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      bottom: 10%;
      right: 10%;
      animation: float 25s infinite ease-in-out reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    /* === Layout === */
    .container {
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* === Header === */
    header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInDown 0.8s ease-out;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .tagline {
      color: var(--primary-dark);
      font-size: 1.1rem;
      opacity: 0.9;
    }

    /* === Stats Bar === */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 30px;
      animation: fadeIn 0.6s ease-out;
    }

    .stat-item {
      text-align: center;
      padding: 15px 25px;
      background: var(--glass);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(102, 252, 241, 0.2);
      border-radius: 12px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--primary-dark);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* === Main Card === */
    .main-card {
      background: var(--glass);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(102, 252, 241, 0.2);
      border-radius: 24px;
      padding: 40px;
      margin-bottom: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: fadeInUp 0.8s ease-out;
    }

    .input-group {
      position: relative;
      margin-bottom: 15px;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--primary-dark);
      font-size: 1.2rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 16px 16px 16px 48px;
      background: rgba(11, 12, 16, 0.6);
      border: 2px solid var(--primary-dark);
      border-radius: 12px;
      color: var(--text-white);
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
    }

    input::placeholder {
      color: rgba(197, 198, 199, 0.5);
    }

    /* === Selectors === */
    .selectors-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .selectors-row select {
      flex: 1;
      padding: 12px;
      background: rgba(11, 12, 16, 0.6);
      border: 2px solid var(--primary-dark);
      border-radius: 12px;
      color: var(--text-white);
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .selectors-row select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .selectors-row option {
      background: var(--bg-card);
      color: var(--text-white);
    }

    /* === Buttons === */
    .btn {
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: var(--bg-dark);
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 252, 241, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }

    .btn-secondary:hover {
      background: var(--primary);
      color: var(--bg-dark);
    }

    /* === Status & Progress === */
    .status {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      font-weight: 500;
      text-align: center;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s ease;
    }

    .status.info {
      background: rgba(102, 252, 241, 0.1);
      border: 1px solid var(--primary);
      color: var(--primary);
    }

    .status.success {
      background: rgba(78, 205, 196, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
    }

    .status.error {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid var(--error);
      color: var(--error);
    }

    .status.loading {
      background: rgba(255, 230, 109, 0.1);
      border: 1px solid var(--warning);
      color: var(--warning);
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--warning);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* === History Section === */
    .history-section {
      background: var(--glass);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(102, 252, 241, 0.2);
      border-radius: 24px;
      padding: 30px;
      animation: fadeInUp 1s ease-out;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .section-title {
      color: var(--primary);
      font-size: 1.3rem;
      font-weight: 600;
    }

    .history-list {
      max-height: 300px;
      overflow-y: auto;
      padding-right: 10px;
    }

    .history-list::-webkit-scrollbar {
      width: 8px;
    }

    .history-list::-webkit-scrollbar-track {
      background: rgba(11, 12, 16, 0.3);
      border-radius: 4px;
    }

    .history-list::-webkit-scrollbar-thumb {
      background: var(--primary-dark);
      border-radius: 4px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: rgba(11, 12, 16, 0.4);
      border: 1px solid rgba(102, 252, 241, 0.1);
      border-radius: 12px;
      margin-bottom: 10px;
      transition: all 0.3s ease;
      animation: slideIn 0.3s ease-out;
    }

    .history-item:hover {
      border-color: var(--primary-dark);
      transform: translateX(5px);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .history-info {
      flex: 1;
      overflow: hidden;
    }

    .history-url {
      color: var(--text-white);
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .history-date {
      color: var(--primary-dark);
      font-size: 0.8rem;
    }

    .history-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--primary-dark);
      background: transparent;
      color: var(--primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .icon-btn:hover {
      background: var(--primary);
      color: var(--bg-dark);
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--primary-dark);
      opacity: 0.7;
    }

    /* === Footer === */
    footer {
      margin-top: auto;
      text-align: center;
      padding: 30px 20px;
      border-top: 1px solid rgba(102, 252, 241, 0.2);
      animation: fadeIn 1.2s ease-out;
    }

    .footer-text {
      color: var(--primary-dark);
      margin-bottom: 15px;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 15px;
    }

    .social-links a {
      color: var(--primary);
      text-decoration: none;
      padding: 8px 16px;
      border: 1px solid var(--primary-dark);
      border-radius: 20px;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }

    .social-links a:hover {
      background: var(--primary);
      color: var(--bg-dark);
      transform: translateY(-2px);
    }

    .copyright {
      font-size: 0.85rem;
      opacity: 0.6;
    }

    /* === Animations === */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* === Responsive === */
    @media (max-width: 600px) {
      .container {
        padding: 20px 15px;
      }
      
      .main-card {
        padding: 24px;
      }
      
      .logo {
        font-size: 1.8rem;
      }
      
      .history-section {
        padding: 20px;
      }

      .stats-bar {
        gap: 15px;
      }

      .stat-item {
        padding: 10px 15px;
      }

      .selectors-row {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="bg-animation"></div>
  
  <div class="container">
    <header>
      <div class="logo">
        <span>🎬</span>
        <span>WebLite Pro</span>
      </div>
      <p class="tagline">Download videos from anywhere, synced to the cloud</p>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="totalDownloads">0</div>
        <div class="stat-label">Downloads</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="todayDownloads">0</div>
        <div class="stat-label">Today</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">⚡</div>
        <div class="stat-label">Active</div>
      </div>
    </div>

    <!-- Main Download Card -->
    <main class="main-card">
      <div class="input-group">
        <span class="input-icon">🔗</span>
        <input type="text" id="videoUrl" placeholder="Paste video URL here (YouTube, TikTok, etc.)" />
      </div>
      
      <!-- Quality & Format Selectors -->
      <div class="selectors-row">
        <select id="qualitySelect">
          <option value="2160">4K (2160p)</option>
          <option value="1080" selected>1080p HD</option>
          <option value="720">720p HD</option>
          <option value="480">480p</option>
          <option value="360">360p</option>
        </select>
        
        <select id="formatSelect">
          <option value="mp4" selected>MP4 Video</option>
          <option value="mp3">MP3 Audio Only</option>
        </select>
      </div>
      
      <button class="btn" id="downloadBtn">
        <span>⬇ Download Now</span>
      </button>
      
      <div id="status" class="status" style="display: none;"></div>
    </main>

    <!-- History Section -->
    <div class="history-section">
      <div class="section-header">
        <h3 class="section-title"> Recent Downloads</h3>
        <div style="display: flex; gap: 10px;">
          <button class="btn-secondary" id="refreshBtn">🔄 Refresh</button>
          <button class="btn-secondary" id="clearBtn">Clear</button>
        </div>
      </div>
      <div class="history-list" id="historyList">
        <div class="empty-state">Loading history...</div>
      </div>
    </div>

    <footer>
      <p class="footer-text">Built with ❤️ by Ce_phas</p>
      <div class="social-links">
        <a href="https://github.com/Cephas-2/WebLite-Downloader-frnt" target="_blank">GitHub</a>
        <a href="https://wa.me/254727003182" target="_blank">WhatsApp</a>
        <a href="mailto:yourmail@example.com">Email</a>
      </div>
      <p class="copyright">© 2025 WebLite Pro. All rights reserved.</p>
    </footer>
  </div>

  <script>
    // ==========================================
    // SUPABASE CONFIGURATION
    // ==========================================
    const SUPABASE_URL = 'https://rmltnfazcabznvfvoaxk.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_s1CAo8znQwFgmSk5VdY_TA_dEiKIQ5N';
    const FUNCTIONS_URL = `${SUPABASE_URL}/functions/v1`;
    
    // Use the global supabase from CDN - DO NOT redeclare with let/const
    // The CDN creates window.supabase, we'll assign it to a variable in init
    
    let supabaseClient;
    let deviceId = localStorage.getItem('device_id') || generateDeviceId();
    
    function generateDeviceId() {
      const id = 'device_' + Math.random().toString(36).substring(2, 15);
      localStorage.setItem('device_id', id);
      return id;
    }
    
    // ==========================================
    // GLOBAL FUNCTIONS (attached to window)
    // ==========================================
    
    window.startDownload = async function() {
      const url = document.getElementById('videoUrl').value.trim();
      const quality = document.getElementById('qualitySelect').value;
      const format = document.getElementById('formatSelect').value;
      const btn = document.getElementById('downloadBtn');
      
      if (!url) {
        showStatus('⚠️ Please enter a video URL', 'error');
        return;
      }
      
      if (!isValidUrl(url)) {
        showStatus('⚠️ Please enter a valid URL', 'error');
        return;
      }
      
      btn.disabled = true;
      showStatus('⏳ Processing on Supabase Edge...', 'loading');
      
      try {
        const response = await fetch(`${FUNCTIONS_URL}/video-download`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'x-device-id': deviceId
          },
          body: JSON.stringify({ 
            url: url, 
            quality: quality, 
            format: format 
          })
        });
        
        const result = await response.json();
        
        if (!response.ok || !result.success) {
          throw new Error(result.error || 'Download failed');
        }
        
        // Trigger browser download from signed URL
        const a = document.createElement('a');
        a.href = result.download_url;
        a.download = result.filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        
        showStatus(`✅ "${result.title}" ready! Expires in ${result.expires_in}`, 'success');
        
        await loadHistory();
        document.getElementById('videoUrl').value = '';
        
      } catch (error) {
        showStatus('❌ ' + error.message, 'error');
        console.error('Download error:', error);
      } finally {
        btn.disabled = false;
      }
    };
    
    window.refreshHistory = async function() {
      showStatus('🔄 Refreshing...', 'loading');
      await loadHistory();
      showStatus('✅ History updated', 'success');
    };
    
    window.clearHistory = async function() {
      if (!confirm('Clear all download history? This will also delete stored files.')) return;
      
      try {
        const { data: items } = await supabaseClient
          .from('downloads')
          .select('storage_path')
          .eq('device_id', deviceId);
        
        if (items?.length) {
          const paths = items.map(i => i.storage_path).filter(Boolean);
          if (paths.length) {
            await supabaseClient.storage.from('videos').remove(paths);
          }
        }
        
        const { error } = await supabaseClient
          .from('downloads')
          .delete()
          .eq('device_id', deviceId);
        
        if (error) throw error;
        
        await loadHistory();
        showStatus('✅ History and files cleared', 'success');
        
      } catch (error) {
        showStatus('❌ Failed to clear: ' + error.message, 'error');
      }
    };
    
    window.reDownload = function(url) {
      document.getElementById('videoUrl').value = url;
      window.startDownload();
    };
    
    window.deleteHistoryItem = async function(id, storagePath) {
      try {
        if (storagePath) {
          await supabaseClient.storage.from('videos').remove([storagePath]);
        }
        
        const { error } = await supabaseClient
          .from('downloads')
          .delete()
          .eq('id', id);
        
        if (error) throw error;
        await loadHistory();
        
      } catch (error) {
        showStatus('❌ Failed to delete', 'error');
      }
    };
    
    // ==========================================
    // HELPER FUNCTIONS
    // ==========================================
    
    function isValidUrl(string) {
      try {
        new URL(string);
        return true;
      } catch (_) {
        return false;
      }
    }
    
    async function loadHistory() {
      try {
        const { data, error } = await supabaseClient
          .from('downloads')
          .select('*')
          .eq('device_id', deviceId)
          .order('downloaded_at', { ascending: false })
          .limit(20);
        
        if (error) throw error;
        
        displayHistory(data || []);
        updateStats(data || []);
        
      } catch (error) {
        console.error('Error loading history:', error);
        document.getElementById('historyList').innerHTML = 
          '<div class="empty-state">⚠️ Could not load history. Check your Supabase config.</div>';
      }
    }
    
    function subscribeToHistory() {
      supabaseClient
        .channel('downloads_channel')
        .on('postgres_changes', 
          { 
            event: '*', 
            schema: 'public', 
            table: 'downloads',
            filter: `device_id=eq.${deviceId}`
          }, 
          (payload) => {
            console.log('Real-time update:', payload);
            loadHistory();
          }
        )
        .subscribe();
    }
    
    function displayHistory(downloads) {
      const historyList = document.getElementById('historyList');
      
      if (downloads.length === 0) {
        historyList.innerHTML = '<div class="empty-state">No downloads yet. Paste a URL above!</div>';
        return;
      }
      
      historyList.innerHTML = downloads.map(item => `
        <div class="history-item">
          <div class="history-info">
            <div class="history-url" title="${item.video_url}">${item.title || truncateUrl(item.video_url)}</div>
            <div class="history-date">
              ${formatDate(item.downloaded_at)} • ${item.quality || '720p'} • ${(item.format || 'mp4').toUpperCase()}
              ${item.status === 'expired' ? ' • ⏰ Expired' : ''}
            </div>
          </div>
          <div class="history-actions">
            <button class="icon-btn" onclick="reDownload('${item.video_url}')" title="Download again">
              ⬇️
            </button>
            <button class="icon-btn" onclick="deleteHistoryItem('${item.id}', '${item.storage_path}')" title="Delete">
              🗑️
            </button>
          </div>
        </div>
      `).join('');
    }
    
    function updateStats(downloads) {
      document.getElementById('totalDownloads').textContent = downloads.length;
      
      const today = new Date().toDateString();
      const todayCount = downloads.filter(d => 
        new Date(d.downloaded_at).toDateString() === today
      ).length;
      document.getElementById('todayDownloads').textContent = todayCount;
    }
    
    function truncateUrl(url) {
      return url.length > 50 ? url.substring(0, 47) + '...' : url;
    }
    
    function formatDate(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const diff = now - date;
      
      if (diff < 3600000) {
        const mins = Math.floor(diff / 60000);
        return mins < 1 ? 'Just now' : `${mins}m ago`;
      }
      if (diff < 86400000) {
        const hours = Math.floor(diff / 3600000);
        return `${hours}h ago`;
      }
      return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }
    
    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.style.display = 'flex';
      status.className = `status ${type}`;
      
      if (type === 'loading') {
        status.innerHTML = `<div class="spinner"></div><span>${message}</span>`;
      } else {
        status.innerHTML = `<span>${message}</span>`;
      }
      
      if (type === 'success') {
        setTimeout(() => {
          status.style.display = 'none';
        }, 5000);
      }
    }
    
    // ==========================================
    // INITIALIZATION
    // ==========================================
    
    document.addEventListener('DOMContentLoaded', async () => {
      // Initialize Supabase client using the global from CDN
      // window.supabase is the namespace, createClient is the method
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      
      // Attach event listeners
      document.getElementById('downloadBtn').addEventListener('click', window.startDownload);
      document.getElementById('refreshBtn').addEventListener('click', window.refreshHistory);
      document.getElementById('clearBtn').addEventListener('click', window.clearHistory);
      
      // Enter key support
      document.getElementById('videoUrl').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') window.startDownload();
      });
      
      // Load history
      await loadHistory();
      subscribeToHistory();
    });
  </script>
</body>
</html>
